name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install

      - name: Check style
        run: npm run eslint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy_to_render:
      needs: build_and_test
      if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip')}}
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

        - name: Create deployment
          uses: JorgeLNJunior/render-deploy@v1.4.4
          with:
            service_id: ${{ secrets.RENDER_SERVICE_ID }}
            api_key: ${{ secrets.RENDER_API_KEY }}
            wait_deploy: true

  notify_success:
      needs: deploy_to_render
      runs-on: ubuntu-latest
      steps:
        - name: Notify Discord Success
          if: needs.deploy_to_render.result == 'success'
          run: |
            curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
              "title": "Deployment Success",
              "description": "New version is LIVE!",
              "url": "https://full-stack-open-pokedex-24hv.onrender.com",
              "color": 65280
            }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK }}

  notify_failure:
      needs: deploy_to_render
      runs-on: ubuntu-latest
      if: always() && (needs.deploy_to_render.result == 'failure')
      steps:
        - name: Notify Discord Failure
          if: needs.deploy_to_render.result == 'failure'
          run: |
            curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
              "title": "Build Failed",
              "description": "**Commit:** `${{ github.sha }}`\n**Author:** ${{ github.actor }}\n**Logs:** [View here](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "color": 16711680
            }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK }}

  tag_release:
     needs: deploy_to_render
     if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip')}}
     runs-on: ubuntu-latest
     steps:
       - uses: actions/checkout@v4
         with:
           fetch-depth: 0
       - name: Bump version and push tag
         uses: anothrNick/github-tag-action@1.75.0
         env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           DEFAULT_BUMP: patch


